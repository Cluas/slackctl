version: 2
project_name: slackctl

before:
  hooks:
    - go mod tidy

builds:
  - id: slackctl
    main: ./cmd/slackctl/
    binary: slackctl
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/cluas/slackctl/internal/cli.version={{.Version}}

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc

release:
  github:
    owner: cluas
    name: slackctl

brews:
  - repository:
      owner: cluas
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    name: slackctl
    homepage: "https://github.com/cluas/slackctl"
    description: "A fast, single-binary Slack CLI for AI agents and humans"
    license: "MIT"
    install: |
      bin.install "slackctl"
    test: |
      assert_match version.to_s, shell_output("#{bin}/slackctl --version")
